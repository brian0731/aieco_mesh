name: iOS App Store Release

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Optional iOS version, for example 1.0.6. Defaults to pubspec.yaml."
        required: false
        type: string
      build_number:
        description: "Optional App Store build number. Defaults to pubspec build + GitHub run number."
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "ios-v*"

permissions:
  contents: read

concurrency:
  group: ios-app-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and Upload IPA
    runs-on: macos-latest
    environment: apple
    timeout-minutes: 60

    env:
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      AIECO_ONLINE_RELAY_URL: ${{ secrets.AIECO_ONLINE_RELAY_URL }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      REQUESTED_BUILD_NAME: ${{ github.event.inputs.build_name || '' }}
      REQUESTED_BUILD_NUMBER: ${{ github.event.inputs.build_number || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in \
            IOS_BUNDLE_ID \
            IOS_DISTRIBUTION_CERTIFICATE_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_BASE64
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::GitHub secret $name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Resolve build version
        shell: bash
        run: |
          pubspec_version="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          pubspec_build_name="${pubspec_version%%+*}"
          pubspec_build_number="${pubspec_version#*+}"
          if [[ "$pubspec_build_number" == "$pubspec_version" || ! "$pubspec_build_number" =~ ^[0-9]+$ ]]; then
            pubspec_build_number=0
          fi

          build_name="${REQUESTED_BUILD_NAME:-$pubspec_build_name}"
          build_number="${REQUESTED_BUILD_NUMBER:-$((pubspec_build_number + GITHUB_RUN_NUMBER))}"

          if [[ -z "$build_name" || -z "$build_number" ]]; then
            echo "::error::Unable to resolve build name or build number."
            exit 1
          fi
          if [[ ! "$build_number" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number must be numeric. Got: $build_number"
            exit 1
          fi

          echo "IOS_BUILD_NAME=$build_name" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"
          echo "Using iOS version $build_name ($build_number)."

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Install signing certificate and provisioning profile
        id: signing
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/distribution.p12"
          profile_path="$RUNNER_TEMP/app_store.mobileprovision"
          profile_plist_path="$RUNNER_TEMP/profile.plist"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf "%s" "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -d > "$certificate_path"
          printf "%s" "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist_path"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist_path")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist_path")"
          team_id="$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$profile_plist_path")"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          echo "APPLE_TEAM_ID=$team_id" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "Installed provisioning profile $profile_name for team $team_id."

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          api_key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf "%s" "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -d > "$api_key_path"
          chmod 600 "$api_key_path"

      - name: Build Flutter iOS app
        shell: bash
        run: |
          dart_defines=()
          if [[ -n "$AIECO_ONLINE_RELAY_URL" ]]; then
            dart_defines+=(--dart-define "AIECO_ONLINE_RELAY_URL=$AIECO_ONLINE_RELAY_URL")
          fi
          if [[ -n "$GOOGLE_MAPS_API_KEY" ]]; then
            dart_defines+=(--dart-define "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY")
          fi

          flutter build ios \
            --release \
            --no-codesign \
            --build-name "$IOS_BUILD_NAME" \
            --build-number "$IOS_BUILD_NUMBER" \
            "${dart_defines[@]}"

      - name: Archive signed iOS app
        shell: bash
        run: |
          xcodebuild clean archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            APP_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME"

      - name: Export signed IPA
        shell: bash
        run: |
          mkdir -p build/ios/export
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$IOS_PROFILE_NAME</string>
            </dict>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath build/ios/export

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-store-ipa
          path: build/ios/export/*.ipa
          if-no-files-found: error

      - name: Upload to App Store Connect
        shell: bash
        run: |
          ipa_path="$(find build/ios/export -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo "::error::No IPA file found in build/ios/export."
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Clean up signing keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
